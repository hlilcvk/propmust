version: '3.8'
services:
  proptrex:
    build: .
    ports:
      - "${PORT:-3001}:3001"
    environment:
      - PORT=3001
      # Optional: set these here OR use the /admin panel after deploy
      # - DATABASE_URL=postgres://...
      # - TELEGRAM_BOT_TOKEN=
      # - TELEGRAM_CHANNEL_ID=
      # - TELEGRAM_ADMIN_ID=
    volumes:
      # Persist settings.json across container restarts/redeploys
      - proptrex_settings:/app/settings.json
    restart: unless-stopped

volumes:
  proptrex_settings:
